name: dart_skills_lint
description: >-
  A static analysis linter for Agent Skills (SKILL.md) written in Dart.
  Validates frontmatter, naming, paths, and structure for use in CI and
  pre-commit hooks.
version: 0.3.1
resolution: workspace
repository: https://github.com/flutter/skills
issue_tracker: https://github.com/flutter/skills/issues

topics:
  - agent-skills
  - linter
  - static-analysis
  - cli
  - validation

environment:
  sdk: ^3.10.8

dependencies:
  args: ^2.4.0
  io: ^1.0.4
  logging: ^1.2.0
  meta: ^1.11.0
  path: ^1.9.1
  yaml: ^3.1.3
  json_annotation: ^4.8.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0
  test_process: ^2.1.1
  json_serializable: ^6.7.0
  build_runner: ^2.4.0
  dart_code_linter: ^4.0.3
  coverage: ^1.15.0

executables:
  dart_skills_lint: cli
