name: logiq
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "ChatGPT Image May 5, 2026, 09_59_59 AM.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "ChatGPT Image May 5, 2026, 09_59_59 AM.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "ChatGPT Image May 5, 2026, 09_59_59 AM.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "ChatGPT Image May 5, 2026, 09_59_59 AM.png"
